services:
  db:
    image: mysql@sha256:7dcddc01f13bab2f15cde676d44d01f61fc9f99fe7785e86196dfc07d358ae2b
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: resort_db
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_USER: resort_app
      MYSQL_PASSWORD_FILE: /run/secrets/db_app_password
    volumes:
      - db_data:/var/lib/mysql
      - ./database/resort_db.sql:/docker-entrypoint-initdb.d/resort_db.sql
      - ./database/z_create_app_user.sql:/docker-entrypoint-initdb.d/z_create_app_user.sql
      - ./database/mysql.cnf:/etc/mysql/conf.d/mysql.cnf:ro
    ports:
      - "127.0.0.1:3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$(cat /run/secrets/db_root_password)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - resort-net
    secrets:
      - db_root_password
      - db_app_password
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=resort_app
      - DB_PASSWORD_FILE=/run/secrets/db_app_password
      - DB_NAME=resort_db
      - ADMIN_SECRET_TOKEN_FILE=/run/secrets/admin_token
      - DISABLE_DOCS=true
      - ALLOWED_ORIGINS=https://rosyohospitality.com.np,https://www.rosyohospitality.com.np
      - LOG_LEVEL=INFO
      - DB_POOL_SIZE=5
    depends_on:
      db:
        condition: service_healthy
    networks:
      - resort-net
    secrets:
      - db_app_password
      - admin_token
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/data:/usr/share/nginx/html/data:ro
    depends_on:
      backend:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    networks:
      - resort-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  dashboard:
    build: ./dashboard
    restart: unless-stopped
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=resort_app
      - DB_PASSWORD_FILE=/run/secrets/db_app_password
      - DB_NAME=resort_db
      - DASHBOARD_PASSWORD_FILE=/run/secrets/dashboard_password
      - LOG_LEVEL=INFO
      - DB_POOL_SIZE=3
    depends_on:
      db:
        condition: service_healthy
    networks:
      - resort-net
    secrets:
      - db_app_password
      - dashboard_password
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8501/dashboard/_stcore/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  db-cron:
    image: mysql@sha256:7dcddc01f13bab2f15cde676d44d01f61fc9f99fe7785e86196dfc07d358ae2b
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - resort-net
    secrets:
      - db_root_password
    volumes:
      - db_data:/var/lib/mysql:ro
      - ./database:/scripts:ro
    environment:
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_PASSWORD_FILE: /run/secrets/db_root_password
    entrypoint: ["/bin/sh"]
    command: ["-c", "sleep 5 && mysql -h db -u root -p$$(cat /run/secrets/db_root_password) resort_db -e 'SELECT 1 AS cron_test;'"]
    # schedule archiving and backups manually or via host cron:
    #   ssh root@vps 'docker compose -f /root/Hotel-Management-System/docker-compose.yml run --rm db-cron'

volumes:
  db_data:

networks:
  resort-net:
    driver: bridge

secrets:
  db_root_password:
    file: ./secrets/db_root_password.txt
  db_app_password:
    file: ./secrets/db_app_password.txt
  admin_token:
    file: ./secrets/admin_token.txt
  dashboard_password:
    file: ./secrets/dashboard_password.txt
